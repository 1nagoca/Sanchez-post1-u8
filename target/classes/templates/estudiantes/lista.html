<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lista de Estudiantes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #eef4ff;
        }

        h1 {
            color: #2563eb;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 7px 14px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn:hover {
            opacity: 0.85;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #2563eb;
            color: white;
            padding: 10px;
            text-align: left;
        }

        td {
            padding: 9px 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover td {
            background: #dbeafe;
        }

        .alerta-exito {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .no-registros {
            color: #64748b;
            text-align: center;
            padding: 20px;
        }

        .encabezado {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="encabezado">
        <h1>&#127891; Lista de Estudiantes</h1>
        <a th:href="@{/estudiantes/nuevo}" class="btn btn-primary">+ Nuevo Estudiante</a>
    </div>

    <!-- Mensaje de éxito (flash) -->
    <div th:if="${exito}" class="alerta-exito" th:text="${exito}"></div>

    <!-- Tabla de estudiantes -->
    <table th:if="${#lists.size(estudiantes) > 0}">
        <thead>
        <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Correo</th>
            <th>Carrera</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="e, iterStat : ${estudiantes}">
            <td th:text="${iterStat.count}"></td>
            <td th:text="${e.nombre}"></td>
            <td th:text="${e.apellido}"></td>
            <td th:text="${e.correo}"></td>
            <td th:text="${e.carrera}"></td>
            <td>
                <a th:href="@{/estudiantes/editar/{id}(id=${e.id})}"
                   class="btn btn-warning">Editar</a>
                &nbsp;
                <a th:href="@{/estudiantes/eliminar/{id}(id=${e.id})}"
                   class="btn btn-danger">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Sin registros -->
    <p th:if="${#lists.size(estudiantes) == 0}" class="no-registros">
        No hay estudiantes registrados aún. ¡Crea el primero!
    </p>

</div>
</body>
</html>
