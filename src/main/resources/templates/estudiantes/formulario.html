<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${titulo}">Formulario Estudiante</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #eef4ff;
        }
        h1 {
            color: #2563eb;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            max-width: 550px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #1e3a8a;
        }
        input[type=text],
        input[type=email] {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid #93c5fd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #2563eb;
            outline: none;
        }
        .error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 4px;
            display: block;
        }
        .alerta-error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .btn {
            padding: 9px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            border: none;
            text-decoration: none;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        .btn-secondary {
            background: #64748b;
            color: white;
            margin-left: 10px;
        }
        .btn:hover {
            opacity: 0.85;
        }
        .acciones {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${titulo}">Formulario</h1>

    <!-- Error de negocio (correo duplicado, etc.) -->
    <div th:if="${error}" class="alerta-error" th:text="${error}"></div>

    <form th:action="@{/estudiantes/guardar}"
          th:object="${estudiante}"
          method="post">

        <!-- Campo oculto con el ID (para distinguir crear vs editar) -->
        <input type="hidden" th:field="*{id}"/>

        <!-- Nombre -->
        <div class="form-group">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" th:field="*{nombre}"
                   placeholder="Ej: Camilo Andres"/>
            <span class="error"
                  th:if="${#fields.hasErrors('nombre')}"
                  th:errors="*{nombre}">
            </span>
        </div>

        <!-- Apellido -->
        <div class="form-group">
            <label for="apellido">Apellido *</label>
            <input type="text" id="apellido" th:field="*{apellido}"
                   placeholder="Ej: Sanchez Martinez"/>
            <span class="error"
                  th:if="${#fields.hasErrors('apellido')}"
                  th:errors="*{apellido}">
            </span>
        </div>

        <!-- Correo -->
        <div class="form-group">
            <label for="correo">Correo electrónico *</label>
            <input type="email" id="correo" th:field="*{correo}"
                   placeholder="Ej: estudiante@ufps.edu.co"/>
            <span class="error"
                  th:if="${#fields.hasErrors('correo')}"
                  th:errors="*{correo}">
            </span>
        </div>

        <!-- Carrera -->
        <div class="form-group">
            <label for="carrera">Carrera *</label>
            <input type="text" id="carrera" th:field="*{carrera}"
                   placeholder="Ej: Ingeniería de Sistemas"/>
            <span class="error"
                  th:if="${#fields.hasErrors('carrera')}"
                  th:errors="*{carrera}">
            </span>
        </div>

        <!-- Botones -->
        <div class="acciones">
            <button type="submit" class="btn btn-primary">&#128190; Guardar</button>
            <a th:href="@{/estudiantes}" class="btn btn-secondary">Cancelar</a>
        </div>

    </form>
</div>
</body>
</html>
